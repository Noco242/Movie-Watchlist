    <h1>All your Movies/TV-shows</h1>
    These are your Movies:

    <br/><br/><br/>

    <div class="gallery-grid">

      <img src="cover-bild.jpg" alt="Filmtitel Cover" class="card-image">

      <div class="card-content">
        <h2 class="card-title">Inception</h2>
        <p class="card-format">Film</p>

        <div class="card-tags">
          <span class="genre">Sci-Fi</span>
          <span class="genre">Action</span>
        </div>

        <p class="movie-origin">USA</p>

        <div class="card-meta">
          <span class="rating">⭐ 8.8</span><br/><br/>
          <span class="status status-watching">Gerade dabei</span>
        </div>
      </div>
    </article>

    </div>

    <br/><br/><br/>

    <table>
        <tr>
            <td>Name</td>
            <td>Inseption</td>
        </tr>
        <tr>
            <td>Film/Serie</td>
            <td>Film</td>
        </tr>
        <tr>
            <td>Genres</td>
            <td>Sci-Fi<br/>Action</td>
        </tr>
        <tr>
            <td>Herkunft</td>
            <td>USA</td>
        </tr>
        <tr>
            <td>Bewertung</td>

        </tr>

    </table>
