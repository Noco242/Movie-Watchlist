<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Movie Watchlist</title>
    <link rel="stylesheet" href="/public/css/global.css">
    <link rel="stylesheet" href="/public/css/homepage.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
<div class="page">
    <header class="main-header">
        <button class="brand" onclick="window.location.href='Homepage.html'" aria-label="Zur Startseite">
            <img id="header-logo" src="/public/scr/logo_none_bg.png" alt="Movie Watchlist Logo">
        </button>

        <nav class="header-actions" aria-label="Hauptnavigation">
            <button class="action-btn" onclick="window.location.href='html/auth/Register.html'">Register</button>
            <button class="action-btn" onclick="window.location.href='html/auth/Logon.html'">Logon</button>
            <button class="action-btn" onclick="window.location.href='html/auth/Logout.html'">Logout</button>
            <button class="action-btn action-btn-primary" onclick="window.location.href='html/Movies/ShowAllMovies.html'">Deine Liste</button>
        </nav>
    </header>

    <main class="hero">
        <p class="hero-tag">Movie Watchlist</p>
        <h1 class="hero-title">Deine Filme. Dein Look. Dein Abend.</h1>
        <p class="hero-copy">Baue dir deine persoenliche Watchlist im Netflix-Style und finde immer sofort, was du als Naechstes schauen willst.</p>
        <button class="hero-cta" onclick="window.location.href='html/auth/Register.html'">Jetzt starten</button>
    </main>
</div>
</body>
</html>
